# Workflow name shown in the GitHub Actions tab
name: CI

on:
  push:
    branches: [main]       # Run on every push to main
  pull_request:
    branches: [main]       # Run on every PR targeting main (before merge)
  workflow_dispatch:       # Adds a manual "Run workflow" button in the GitHub UI

# Cancel any in-progress run for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  # Compiles on all 3 platforms in parallel and uploads the binary as an artifact
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MinGW-w64)
            os: windows-latest
            artifact: shell.exe
            msys2: true

          - name: Linux (GCC-13)
            os: ubuntu-latest
            artifact: shell
            msys2: false

          - name: macOS (Clang)
            os: macos-latest
            artifact: shell
            msys2: false

    steps:
      - uses: actions/checkout@v4

      # ── Windows: MSYS2 + MinGW-w64 ──────────────────────────────────────────
      - name: Setup MSYS2 + MinGW-w64
        if: matrix.msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          pacboy: >-
            gcc:p
            cmake:p
            ninja:p
            ccache:p

      # ── Linux: GCC-13 ────────────────────────────────────────────────────────
      - name: Install GCC-13
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-13 g++-13 ccache
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 \
            --slave   /usr/bin/g++ g++ /usr/bin/g++-13

      # ── macOS: ccache ────────────────────────────────────────────────────────
      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      # ── Shared build cache (Linux / macOS) ──────────────────────────────────
      - name: Restore ccache
        if: "!matrix.msys2"
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: ccache-${{ matrix.os }}-

      - name: Configure & build (Windows)
        if: matrix.msys2
        shell: msys2 {0}
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          cmake -G Ninja -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel

      - name: Configure & build (Linux / macOS)
        if: "!matrix.msys2"
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build --parallel

      # Upload so the test job (and the Actions run page) can access it
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: shell-${{ matrix.os }}
          path: build/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 7

  # ── 2. Test ─────────────────────────────────────────────────────────────────
  # Downloads each platform binary and runs smoke tests — no compiler needed
  test:
    name: Test — ${{ matrix.name }}
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows (MinGW-w64)
            os: windows-latest
            artifact: shell.exe

          - name: Linux (GCC-13)
            os: ubuntu-latest
            artifact: shell

          - name: macOS (Clang)
            os: macos-latest
            artifact: shell

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: shell-${{ matrix.os }}
          path: build/

      - name: Mark executable
        if: runner.os != 'Windows'
        run: chmod +x build/${{ matrix.artifact }}

      # shell: bash works on all 3 platforms (Git Bash on Windows, native elsewhere)
      - name: Smoke tests
        shell: bash
        run: bash tests/smoke.sh ./build/${{ matrix.artifact }}
